<div class="kw-tool" id="brew-ratio-rechner">
  <h3>Brew-Ratio-Rechner</h3>
  <p class="kw-tool-intro">Wähle Methode und Kaffeemenge – der Rechner ermittelt das passende Wasser oder den Espresso-Output.</p>

  <div class="kw-tool-field">
    <label for="br-method">Methode</label>
    <select id="br-method" class="kw-tool-input">
      <option value="1.8">Espresso ristrettoartig (1:1,8)</option>
      <option value="2" selected>Espresso klassisch (1:2)</option>
      <option value="2.5">Espresso lungo (1:2,5)</option>
      <option value="15">Aeropress (1:15)</option>
      <option value="16.7">Pour Over / V60 (1:16,7)</option>
      <option value="16.7">Chemex (1:16,7)</option>
      <option value="16.7">French Press (1:16,7)</option>
      <option value="10">Cold Brew Konzentrat (1:10)</option>
    </select>
  </div>

  <div class="kw-tool-field">
    <label for="br-coffee">Kaffee (g)</label>
    <input id="br-coffee" type="number" class="kw-tool-input" value="18" min="1" max="500" step="0.5">
  </div>

  <div class="kw-tool-result">
    <div class="kw-tool-result-label">Wasser / Output</div>
    <div class="kw-tool-result-value" id="br-output">36 g</div>
  </div>
</div>

<script>
(function(){
  var m = document.getElementById('br-method');
  var c = document.getElementById('br-coffee');
  var o = document.getElementById('br-output');
  function calc(){
    var ratio = parseFloat(m.value);
    var coffee = parseFloat(c.value) || 0;
    o.textContent = (coffee * ratio).toFixed(1) + ' g';
  }
  m.addEventListener('change', calc);
  c.addEventListener('input', calc);
  calc();
})();
</script>
